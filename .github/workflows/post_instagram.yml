name: Post Instagram Carousel
on:
  push:
    branches:
      - claude/zealous-ride-fhk5O
    paths:
      - '.github/workflows/post_instagram.yml'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Call Make webhook
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, sys

          BRANCH = "d78fc71c901bbdab438c55e009e20932ee664b12"
          BASE = f"https://raw.githubusercontent.com/luksjfernandes-ctrl/Carrosseis-reels/{BRANCH}/carousel-18-04-2026"
          IMAGES = [f"{BASE}/slide-{i:02d}.jpg" for i in range(1, 11)]

          CAPTION = """A impenhorabilidade de bens de trabalho nunca foi tecnicamente neutra: ela decide, antes de qualquer fundamento moral, quem pode continuar produzindo e quem não pode.

O Código de Processo Civil reconhece isso no art. 833, V. Máquinas, ferramentas e instrumentos necessários ao exercício da profissão são impenhoráveis não por benevolência, mas porque o direito, quando opera com racionalidade substantiva, não confunde extração com construção. Weber identificou nessa tensão algo estrutural: a lógica formal do crédito e a lógica material da sobrevivência econômica não se resolvem sozinhas. Um sistema de execução que sequestra o meio que ainda poderia gerar o pagamento da dívida não é eficiente: é autodestrutivo. O TRT-18 e o TRF-3 enfrentaram exatamente esse paradoxo em casos de hemodiálise. A decisão foi a mesma nos dois: retirar o equipamento central de uma clínica não é cobrança, é amputação da capacidade produtiva. O que parece linguagem jurídica é, no fundo, uma escolha sobre quem merece continuar existindo como agente econômico.

Salva para revisitar.

#filosofiadodireito #direitoprocessual #impenhorabilidade #sociologiajuridica #institutoapolineo #pensamentocritico #direitotrabalhista #teoriasocial #humanidades #culturacontemporanea"""

          payload = json.dumps({"images": IMAGES, "caption": CAPTION}).encode("utf-8")
          url = "https://hook.us2.make.com/y257daoepri1b26k37wvgb1hrf11yf7c"
          req = urllib.request.Request(url, data=payload,
              headers={"Content-Type": "application/json"}, method="POST")
          try:
              resp = urllib.request.urlopen(req, timeout=30)
              print(f"SUCCESS: HTTP {resp.status}")
              print(resp.read().decode())
              sys.exit(0)
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"FAILED: HTTP {e.code}: {body}")
              sys.exit(1)
          except Exception as ex:
              print(f"ERROR: {ex}")
              sys.exit(1)
          PYEOF
